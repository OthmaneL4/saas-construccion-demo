spring.datasource.url=jdbc:h2:mem:lsototalbouw_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.h2.console.enabled=false
spring.thymeleaf.cache=false

app.h2-console.enabled=false
app.demo-login.enabled=false
app.upload.documents-dir=${java.io.tmpdir}/lsototalbouw-test-documents
