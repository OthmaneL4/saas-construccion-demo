spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT_MS:5000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME_MS:1800000}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
spring.sql.init.mode=never

spring.h2.console.enabled=false
spring.thymeleaf.cache=true

server.forward-headers-strategy=framework
server.shutdown=graceful
server.servlet.session.cookie.secure=true
spring.lifecycle.timeout-per-shutdown-phase=${SHUTDOWN_TIMEOUT:30s}

management.endpoint.health.probes.enabled=true

app.h2-console.enabled=false
app.demo-login.enabled=false
app.upload.documents-dir=${DOCUMENTS_DIR}
app.bootstrap.company-name=${APP_BOOTSTRAP_COMPANY_NAME:LSOTOTALBOUW}
app.bootstrap.company-vat-number=${APP_BOOTSTRAP_COMPANY_VAT_NUMBER:}
app.bootstrap.company-email=${APP_BOOTSTRAP_COMPANY_EMAIL:}
app.bootstrap.company-phone=${APP_BOOTSTRAP_COMPANY_PHONE:}
app.bootstrap.company-address=${APP_BOOTSTRAP_COMPANY_ADDRESS:}
app.bootstrap.admin-full-name=${APP_BOOTSTRAP_ADMIN_FULL_NAME:LSOTOTALBOUW Owner}
app.bootstrap.admin-email=${APP_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin-password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}
