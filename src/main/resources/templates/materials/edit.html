<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head(${pageTitle})}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{layout/fragments :: sidebar}"></aside>
    <main class="app-main">
        <header th:replace="~{layout/fragments :: topbar}"></header>
        <section class="content">
            <form class="data-panel form-panel" th:action="@{/materials/{id}/edit(id=${material.id})}" th:object="${materialForm}" method="post">
                <h2>Editar material</h2>
                <div class="row g-3">
                    <div class="col-lg-4">
                        <label class="form-label" for="name">Material</label>
                        <input class="form-control" id="name" th:field="*{name}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{name}"></div>
                    </div>
                    <div class="col-lg-2">
                        <label class="form-label" for="unit">Unidad</label>
                        <input class="form-control" id="unit" th:field="*{unit}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{unit}"></div>
                    </div>
                    <div class="col-lg-2">
                        <label class="form-label" for="stockQuantity">Stock</label>
                        <input class="form-control" id="stockQuantity" type="number" min="0" th:field="*{stockQuantity}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{stockQuantity}"></div>
                    </div>
                    <div class="col-lg-2">
                        <label class="form-label" for="minimumStock">Minimo</label>
                        <input class="form-control" id="minimumStock" type="number" min="0" th:field="*{minimumStock}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{minimumStock}"></div>
                    </div>
                    <div class="col-lg-2">
                        <label class="form-label" for="unitCost">Coste</label>
                        <input class="form-control" id="unitCost" type="number" step="0.01" min="0" th:field="*{unitCost}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{unitCost}"></div>
                    </div>
                </div>
                <div class="mt-3 d-flex justify-content-end gap-2">
                    <a class="btn btn-outline-dark" th:href="@{/materials/{id}(id=${material.id})}">Cancelar</a>
                    <button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> Guardar cambios</button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
