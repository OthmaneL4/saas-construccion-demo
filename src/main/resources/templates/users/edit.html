<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head(${pageTitle})}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{layout/fragments :: sidebar}"></aside>
    <main class="app-main">
        <header th:replace="~{layout/fragments :: topbar}"></header>
        <section class="content">
            <form class="data-panel form-panel" th:action="@{/users/{id}/edit(id=${user.id})}" th:object="${userForm}" method="post">
                <h2>Editar usuario</h2>
                <div class="row g-3">
                    <div class="col-lg-4">
                        <label class="form-label" for="fullName">Nombre</label>
                        <input class="form-control" id="fullName" th:field="*{fullName}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{fullName}"></div>
                    </div>
                    <div class="col-lg-4">
                        <label class="form-label" for="email">Email</label>
                        <input class="form-control" id="email" type="email" th:field="*{email}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{email}"></div>
                    </div>
                    <div class="col-lg-4">
                        <label class="form-label" for="password">Nueva contrasena</label>
                        <input class="form-control" id="password" type="password" th:field="*{password}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{password}"></div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Roles</label>
                        <div class="d-flex flex-wrap gap-3">
                            <label class="form-check" th:each="role : ${roles}">
                                <input class="form-check-input" type="checkbox" th:field="*{roleIds}" th:value="${role.id}">
                                <span class="form-check-label" th:text="${#strings.replace(role.name, 'ROLE_', '')}">ROL</span>
                            </label>
                        </div>
                        <div class="text-danger small" th:errors="*{roleIds}"></div>
                    </div>
                </div>
                <div class="mt-3 d-flex justify-content-end gap-2">
                    <a class="btn btn-outline-dark" th:href="@{/users}">Cancelar</a>
                    <button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> Guardar cambios</button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
