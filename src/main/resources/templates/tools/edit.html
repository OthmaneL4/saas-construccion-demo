<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head(${pageTitle})}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{layout/fragments :: sidebar}"></aside>
    <main class="app-main">
        <header th:replace="~{layout/fragments :: topbar}"></header>
        <section class="content">
            <form class="data-panel form-panel" th:action="@{/tools/{id}/edit(id=${tool.id})}" th:object="${toolForm}" method="post">
                <h2>Editar herramienta</h2>
                <div class="row g-3">
                    <div class="col-lg-4">
                        <label class="form-label" for="name">Herramienta</label>
                        <input class="form-control" id="name" th:field="*{name}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{name}"></div>
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="serialNumber">N de serie</label>
                        <input class="form-control" id="serialNumber" th:field="*{serialNumber}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{serialNumber}"></div>
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="status">Estado</label>
                        <select class="form-select" id="status" th:field="*{status}" th:errorclass="is-invalid">
                            <option th:each="status : ${statuses}" th:value="${status}" th:text="${status.label}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{status}"></div>
                    </div>
                    <div class="col-lg-2">
                        <label class="form-label" for="nextMaintenanceDate">Mantenimiento</label>
                        <input class="form-control" id="nextMaintenanceDate" type="date" th:field="*{nextMaintenanceDate}">
                    </div>
                </div>
                <div class="mt-3 d-flex justify-content-end gap-2">
                    <a class="btn btn-outline-dark" th:href="@{/tools/{id}(id=${tool.id})}">Cancelar</a>
                    <button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> Guardar cambios</button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
