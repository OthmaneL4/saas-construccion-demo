<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head(${pageTitle})}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{layout/fragments :: sidebar}"></aside>
    <main class="app-main">
        <header th:replace="~{layout/fragments :: topbar}"></header>
        <section class="content">
            <form class="data-panel form-panel" th:action="@{/payments/{id}/edit(id=${payment.id})}" th:object="${paymentForm}" method="post">
                <h2>Editar pago</h2>
                <div class="row g-3">
                    <div class="col-lg-4">
                        <label class="form-label" for="invoiceId">Factura</label>
                        <select class="form-select" id="invoiceId" th:field="*{invoiceId}" th:errorclass="is-invalid">
                            <option th:each="invoice : ${invoices}"
                                    th:value="${invoice.id}"
                                    th:attr="data-outstanding=${invoiceAvailableAmounts[invoice.id]}"
                                    th:text="${invoice.invoiceNumber + ' - ' + invoice.customer.name}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{invoiceId}"></div>
                    </div>
                    <div class="col-lg-2">
                        <label class="form-label" for="amount">Importe</label>
                        <input class="form-control" id="amount" type="number" step="0.01" min="0.01" th:field="*{amount}" th:errorclass="is-invalid">
                        <div class="form-text" id="amountHelp">Disponible para esta factura.</div>
                        <div class="invalid-feedback" th:errors="*{amount}"></div>
                    </div>
                    <div class="col-lg-2">
                        <label class="form-label" for="paymentDate">Fecha</label>
                        <input class="form-control" id="paymentDate" type="date" th:field="*{paymentDate}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{paymentDate}"></div>
                    </div>
                    <div class="col-lg-2">
                        <label class="form-label" for="method">Metodo</label>
                        <input class="form-control" id="method" th:field="*{method}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{method}"></div>
                    </div>
                    <div class="col-lg-2">
                        <label class="form-label" for="status">Estado</label>
                        <select class="form-select" id="status" th:field="*{status}" th:errorclass="is-invalid">
                            <option th:each="status : ${statuses}" th:value="${status}" th:text="${status.label}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{status}"></div>
                    </div>
                </div>
                <div class="mt-3 d-flex justify-content-end gap-2">
                    <a class="btn btn-outline-dark" th:href="@{/payments/{id}(id=${payment.id})}">Cancelar</a>
                    <button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> Guardar cambios</button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
