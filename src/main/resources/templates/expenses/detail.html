<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head(${pageTitle})}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{layout/fragments :: sidebar}"></aside>
    <main class="app-main">
        <header th:replace="~{layout/fragments :: topbar}"></header>
        <section class="content">
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div class="data-panel">
                <div class="panel-title">
                    <h2 th:text="${expense.description}">Gasto</h2>
                    <div class="row-actions">
                        <a class="btn btn-sm btn-outline-dark" th:href="@{/expenses/{id}/edit(id=${expense.id})}">
                            <i class="fa-solid fa-pen"></i> Editar
                        </a>
                        <form th:action="@{/expenses/{id}/archive(id=${expense.id})}" method="post">
                            <button class="btn btn-sm btn-outline-danger" type="submit">
                                <i class="fa-solid fa-box-archive"></i> Archivar
                            </button>
                        </form>
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/expenses}">
                            <i class="fa-solid fa-arrow-left"></i> Volver
                        </a>
                    </div>
                </div>
                <div class="detail-grid">
                    <div class="detail-item"><span>Proyecto</span><strong th:text="${expense.project != null ? expense.project.name : '-'}">-</strong></div>
                    <div class="detail-item"><span>Categoria</span><strong th:text="${expense.category}">Categoria</strong></div>
                    <div class="detail-item"><span>Fecha</span><strong th:text="${expense.expenseDate ?: '-'}">-</strong></div>
                    <div class="detail-item"><span>Importe</span><strong th:text="${'EUR ' + #numbers.formatDecimal(expense.amount, 1, 'POINT', 2, 'COMMA')}">EUR 0</strong></div>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
