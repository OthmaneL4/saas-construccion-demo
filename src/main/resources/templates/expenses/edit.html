<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head(${pageTitle})}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{layout/fragments :: sidebar}"></aside>
    <main class="app-main">
        <header th:replace="~{layout/fragments :: topbar}"></header>
        <section class="content">
            <form class="data-panel form-panel" th:action="@{/expenses/{id}/edit(id=${expense.id})}" th:object="${expenseForm}" method="post">
                <h2>Editar gasto</h2>
                <div class="row g-3">
                    <div class="col-lg-4">
                        <label class="form-label" for="description">Descripcion</label>
                        <input class="form-control" id="description" th:field="*{description}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{description}"></div>
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="amount">Importe</label>
                        <input class="form-control" id="amount" type="number" step="0.01" min="0.01" th:field="*{amount}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{amount}"></div>
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="category">Categoria</label>
                        <input class="form-control" id="category" th:field="*{category}" th:errorclass="is-invalid" list="expenseCategoryOptions">
                        <datalist id="expenseCategoryOptions">
                            <option th:each="category : ${expenseCategories}" th:value="${category}"></option>
                        </datalist>
                        <div class="invalid-feedback" th:errors="*{category}"></div>
                    </div>
                    <div class="col-lg-2">
                        <label class="form-label" for="expenseDate">Fecha</label>
                        <input class="form-control" id="expenseDate" type="date" th:field="*{expenseDate}">
                    </div>
                    <div class="col-lg-6">
                        <label class="form-label" for="projectId">Proyecto</label>
                        <select class="form-select" id="projectId" th:field="*{projectId}">
                            <option value="">Sin proyecto</option>
                            <option th:each="project : ${projects}" th:value="${project.id}" th:text="${project.name}"></option>
                        </select>
                    </div>
                </div>
                <div class="mt-3 d-flex justify-content-end gap-2">
                    <a class="btn btn-outline-dark" th:href="@{/expenses/{id}(id=${expense.id})}">Cancelar</a>
                    <button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> Guardar cambios</button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
