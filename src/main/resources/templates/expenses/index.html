<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head(${pageTitle})}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{layout/fragments :: sidebar}"></aside>
    <main class="app-main">
        <header th:replace="~{layout/fragments :: topbar}"></header>
        <section class="content">
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="stat-card">
                        <span>Gastos visibles</span>
                        <strong th:text="${expenseCount}">0</strong>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <span>Total filtrado</span>
                        <strong th:text="${'EUR ' + #numbers.formatDecimal(totalFilteredExpenses, 1, 'POINT', 2, 'COMMA')}">EUR 0</strong>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <span>Gasto medio</span>
                        <strong th:text="${'EUR ' + #numbers.formatDecimal(averageFilteredExpense, 1, 'POINT', 2, 'COMMA')}">EUR 0</strong>
                    </div>
                </div>
            </div>
            <form class="data-panel form-panel" th:action="@{/expenses}" th:object="${expenseForm}" method="post">
                <h2>Registrar gasto</h2>
                <div class="row g-3">
                    <div class="col-lg-4">
                        <label class="form-label" for="description">Descripcion</label>
                        <input class="form-control" id="description" th:field="*{description}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{description}"></div>
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="amount">Importe</label>
                        <input class="form-control" id="amount" type="number" step="0.01" min="0.01" th:field="*{amount}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{amount}"></div>
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="category">Categoria</label>
                        <input class="form-control" id="category" th:field="*{category}" th:errorclass="is-invalid" list="expenseCategoryOptions">
                        <datalist id="expenseCategoryOptions">
                            <option th:each="category : ${expenseCategories}" th:value="${category}"></option>
                        </datalist>
                        <div class="invalid-feedback" th:errors="*{category}"></div>
                    </div>
                    <div class="col-lg-2">
                        <label class="form-label" for="expenseDate">Fecha</label>
                        <input class="form-control" id="expenseDate" type="date" th:field="*{expenseDate}">
                    </div>
                    <div class="col-lg-6">
                        <label class="form-label" for="projectId">Proyecto</label>
                        <select class="form-select" id="projectId" th:field="*{projectId}">
                            <option value="">Sin proyecto</option>
                            <option th:each="project : ${projects}" th:value="${project.id}" th:text="${project.name}"></option>
                        </select>
                    </div>
                </div>
                <div class="mt-3 text-end">
                    <button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> Guardar gasto</button>
                </div>
            </form>
            <div class="data-panel">
                <div class="panel-title">
                    <h2>Gastos</h2>
                </div>
                <form class="row g-2 mb-3" th:action="@{/expenses}" method="get">
                    <div class="col-xl-4 col-lg-6">
                        <label class="form-label" for="expenseSearch">Buscar</label>
                        <input class="form-control" id="expenseSearch" name="q" th:value="${query}" placeholder="Descripcion, categoria o proyecto">
                    </div>
                    <div class="col-xl-2 col-lg-3">
                        <label class="form-label" for="expenseProjectFilter">Proyecto</label>
                        <select class="form-select" id="expenseProjectFilter" name="projectId">
                            <option value="">Todos</option>
                            <option th:each="project : ${projects}" th:value="${project.id}" th:selected="${project.id == selectedProjectId}" th:text="${project.name}">Proyecto</option>
                        </select>
                    </div>
                    <div class="col-xl-2 col-lg-3">
                        <label class="form-label" for="expenseCategoryFilter">Categoria</label>
                        <select class="form-select" id="expenseCategoryFilter" name="category">
                            <option value="">Todas</option>
                            <option th:each="category : ${expenseCategories}" th:value="${category}" th:selected="${category == selectedCategory}" th:text="${category}">Categoria</option>
                        </select>
                    </div>
                    <div class="col-xl-2 col-lg-3">
                        <label class="form-label" for="expenseFromFilter">Desde</label>
                        <input class="form-control" id="expenseFromFilter" name="from" type="date" th:value="${fromDate}">
                    </div>
                    <div class="col-xl-2 col-lg-3">
                        <label class="form-label" for="expenseToFilter">Hasta</label>
                        <input class="form-control" id="expenseToFilter" name="to" type="date" th:value="${toDate}">
                    </div>
                    <div class="col-xl-2 col-lg-3 d-flex align-items-end gap-2">
                        <button class="btn btn-outline-primary w-100" type="submit"><i class="fa-solid fa-filter"></i> Filtrar</button>
                        <a class="btn btn-outline-dark" th:href="@{/expenses}"><i class="fa-solid fa-xmark"></i></a>
                    </div>
                </form>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>Descripcion</th>
                            <th>Proyecto</th>
                            <th>Categoria</th>
                            <th>Fecha</th>
                            <th>Importe</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="expense : ${expenses}">
                            <td><strong th:text="${expense.description}">Gasto</strong></td>
                            <td th:text="${expense.project != null ? expense.project.name : '-'}">Proyecto</td>
                            <td th:text="${expense.category}">Categoria</td>
                            <td th:text="${expense.expenseDate}">Fecha</td>
                            <td th:text="${'EUR ' + #numbers.formatDecimal(expense.amount, 1, 'POINT', 2, 'COMMA')}">EUR 0</td>
                            <td>
                                <div class="row-actions">
                                    <a class="btn btn-sm btn-outline-primary" th:href="@{/expenses/{id}(id=${expense.id})}">
                                        <i class="fa-solid fa-eye"></i>
                                    </a>
                                    <a class="btn btn-sm btn-outline-dark" th:href="@{/expenses/{id}/edit(id=${expense.id})}">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>
                                    <form th:action="@{/expenses/{id}/archive(id=${expense.id})}" method="post">
                                        <button class="btn btn-sm btn-outline-danger" type="submit">
                                            <i class="fa-solid fa-box-archive"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(expenses)}">
                            <td colspan="6" class="text-center text-muted py-4">No hay gastos que coincidan con los filtros.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
