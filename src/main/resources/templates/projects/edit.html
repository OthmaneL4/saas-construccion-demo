<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head(${pageTitle})}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{layout/fragments :: sidebar}"></aside>
    <main class="app-main">
        <header th:replace="~{layout/fragments :: topbar}"></header>
        <section class="content">
            <form class="data-panel form-panel" th:action="@{/projects/{id}/edit(id=${project.id})}" th:object="${projectForm}" method="post">
                <h2>Editar proyecto</h2>
                <div class="row g-3">
                    <div class="col-lg-4">
                        <label class="form-label" for="customerId">Cliente</label>
                        <select class="form-select" id="customerId" th:field="*{customerId}" th:errorclass="is-invalid">
                            <option value="">Seleccionar cliente</option>
                            <option th:each="customer : ${customers}" th:value="${customer.id}" th:text="${customer.name}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{customerId}"></div>
                    </div>
                    <div class="col-lg-4">
                        <label class="form-label" for="name">Proyecto</label>
                        <input class="form-control" id="name" th:field="*{name}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{name}"></div>
                    </div>
                    <div class="col-lg-4">
                        <label class="form-label" for="budget">Presupuesto</label>
                        <input class="form-control" id="budget" type="number" step="0.01" min="0" th:field="*{budget}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{budget}"></div>
                    </div>
                    <div class="col-lg-5">
                        <label class="form-label" for="workAddress">Dirección de obra</label>
                        <input class="form-control" id="workAddress" th:field="*{workAddress}">
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="startDate">Inicio</label>
                        <input class="form-control" id="startDate" type="date" th:field="*{startDate}">
                    </div>
                    <div class="col-lg-4">
                        <label class="form-label" for="status">Estado</label>
                        <select class="form-select" id="status" th:field="*{status}">
                            <option th:each="status : ${statuses}" th:value="${status}" th:text="${status.label}"></option>
                        </select>
                    </div>
                </div>
                <div class="mt-3 d-flex justify-content-end gap-2">
                    <a class="btn btn-outline-dark" th:href="@{/projects/{id}(id=${project.id})}">Cancelar</a>
                    <button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> Guardar cambios</button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
