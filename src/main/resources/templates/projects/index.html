<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head(${pageTitle})}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{layout/fragments :: sidebar}"></aside>
    <main class="app-main">
        <header th:replace="~{layout/fragments :: topbar}"></header>
        <section class="content">
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <form class="data-panel form-panel" th:action="@{/projects}" th:object="${projectForm}" method="post">
                <h2>Nuevo proyecto</h2>
                <div class="row g-3">
                    <div class="col-lg-4">
                        <label class="form-label" for="customerId">Cliente</label>
                        <select class="form-select" id="customerId" th:field="*{customerId}" th:errorclass="is-invalid">
                            <option value="">Seleccionar cliente</option>
                            <option th:each="customer : ${customers}" th:value="${customer.id}" th:text="${customer.name}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{customerId}"></div>
                    </div>
                    <div class="col-lg-4">
                        <label class="form-label" for="name">Proyecto</label>
                        <input class="form-control" id="name" th:field="*{name}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{name}"></div>
                    </div>
                    <div class="col-lg-4">
                        <label class="form-label" for="budget">Presupuesto</label>
                        <input class="form-control" id="budget" type="number" step="0.01" min="0" th:field="*{budget}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{budget}"></div>
                    </div>
                    <div class="col-lg-5">
                        <label class="form-label" for="workAddress">Dirección de obra</label>
                        <input class="form-control" id="workAddress" th:field="*{workAddress}" th:errorclass="is-invalid">
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="startDate">Inicio</label>
                        <input class="form-control" id="startDate" type="date" th:field="*{startDate}">
                    </div>
                    <div class="col-lg-4">
                        <label class="form-label" for="status">Estado</label>
                        <select class="form-select" id="status" th:field="*{status}">
                            <option th:each="status : ${statuses}" th:value="${status}" th:text="${status.label}"></option>
                        </select>
                    </div>
                </div>
                <div class="mt-3 text-end">
                    <button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> Guardar proyecto</button>
                </div>
            </form>
            <div class="data-panel">
                <div class="panel-title">
                    <h2>Proyectos</h2>
                </div>
                <form class="row g-2 mb-3" th:action="@{/projects}" method="get">
                    <div class="col-lg-6">
                        <label class="form-label" for="projectSearch">Buscar</label>
                        <input class="form-control" id="projectSearch" name="q" th:value="${query}" placeholder="Proyecto, cliente o direccion">
                    </div>
                    <div class="col-lg-4">
                        <label class="form-label" for="projectStatusFilter">Estado</label>
                        <select class="form-select" id="projectStatusFilter" name="status">
                            <option value="">Todos</option>
                            <option th:each="status : ${statuses}" th:value="${status}" th:selected="${status == selectedStatus}" th:text="${status.label}">Estado</option>
                        </select>
                    </div>
                    <div class="col-lg-2 d-flex align-items-end gap-2">
                        <button class="btn btn-outline-primary w-100" type="submit"><i class="fa-solid fa-filter"></i> Filtrar</button>
                        <a class="btn btn-outline-dark" th:href="@{/projects}"><i class="fa-solid fa-xmark"></i></a>
                    </div>
                </form>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>Proyecto</th>
                            <th>Cliente</th>
                            <th>Dirección</th>
                            <th>Inicio</th>
                            <th>Estado</th>
                            <th>Presupuesto</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="project : ${projectPage.content}">
                            <td><strong th:text="${project.name}">Proyecto</strong></td>
                            <td th:text="${project.customer.name}">Cliente</td>
                            <td th:text="${project.workAddress}">Dirección</td>
                            <td th:text="${project.startDate}">Fecha</td>
                            <td><span class="badge-status" th:classappend="${'status-' + project.status}" th:text="${project.status.label}">Estado</span></td>
                            <td th:text="${'EUR ' + #numbers.formatDecimal(project.budget, 1, 'POINT', 2, 'COMMA')}">EUR 0</td>
                            <td>
                                <div class="row-actions">
                                    <a class="btn btn-sm btn-outline-primary" th:href="@{/projects/{id}(id=${project.id})}">
                                        <i class="fa-solid fa-eye"></i>
                                    </a>
                                    <a class="btn btn-sm btn-outline-dark" th:href="@{/projects/{id}/edit(id=${project.id})}">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>
                                    <form th:action="@{/projects/{id}/archive(id=${project.id})}" method="post">
                                        <button class="btn btn-sm btn-outline-danger" type="submit">
                                            <i class="fa-solid fa-box-archive"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(projectPage.content)}">
                            <td colspan="7" class="text-center text-muted py-4">No hay proyectos que coincidan con los filtros.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="d-flex justify-content-between align-items-center pt-3">
                    <span class="text-muted small" th:text="${projectPage.totalElements + ' proyectos'}">0 proyectos</span>
                    <div class="row-actions">
                        <a class="btn btn-sm btn-outline-dark"
                           th:classappend="${projectPage.first} ? ' disabled'"
                           th:href="@{/projects(q=${query},status=${selectedStatus},page=${projectPage.number - 1})}">Anterior</a>
                        <span class="btn btn-sm btn-outline-secondary disabled" th:text="${(projectPage.number + 1) + ' / ' + projectPage.totalPages}">1 / 1</span>
                        <a class="btn btn-sm btn-outline-dark"
                           th:classappend="${projectPage.last} ? ' disabled'"
                           th:href="@{/projects(q=${query},status=${selectedStatus},page=${projectPage.number + 1})}">Siguiente</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
