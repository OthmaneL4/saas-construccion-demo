<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head(${pageTitle})}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{layout/fragments :: sidebar}"></aside>
    <main class="app-main">
        <header th:replace="~{layout/fragments :: topbar}"></header>
        <section class="content">
            <form class="data-panel form-panel" th:action="@{/customers/{id}/edit(id=${customer.id})}" th:object="${customerForm}" method="post">
                <h2>Editar cliente</h2>
                <div class="row g-3">
                    <div class="col-lg-4">
                        <label class="form-label" for="name">Nombre</label>
                        <input class="form-control" id="name" th:field="*{name}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{name}"></div>
                    </div>
                    <div class="col-lg-4">
                        <label class="form-label" for="email">Email</label>
                        <input class="form-control" id="email" type="email" th:field="*{email}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{email}"></div>
                    </div>
                    <div class="col-lg-4">
                        <label class="form-label" for="phone">Teléfono</label>
                        <input class="form-control" id="phone" th:field="*{phone}">
                    </div>
                    <div class="col-lg-8">
                        <label class="form-label" for="address">Dirección</label>
                        <input class="form-control" id="address" th:field="*{address}">
                    </div>
                    <div class="col-lg-4">
                        <label class="form-label" for="city">Ciudad</label>
                        <input class="form-control" id="city" th:field="*{city}">
                    </div>
                </div>
                <div class="mt-3 d-flex justify-content-end gap-2">
                    <a class="btn btn-outline-dark" th:href="@{/customers/{id}(id=${customer.id})}">Cancelar</a>
                    <button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> Guardar cambios</button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
