<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head(${pageTitle})}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{layout/fragments :: sidebar}"></aside>
    <main class="app-main">
        <header th:replace="~{layout/fragments :: topbar}"></header>
        <section class="content">
            <form class="data-panel form-panel" th:action="@{/invoices/{id}/edit(id=${invoice.id})}" th:object="${invoiceForm}" method="post">
                <h2>Editar factura</h2>
                <div class="row g-3">
                    <div class="col-lg-3">
                        <label class="form-label" for="invoiceNumber">N</label>
                        <input class="form-control" id="invoiceNumber" th:field="*{invoiceNumber}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{invoiceNumber}"></div>
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="customerId">Cliente</label>
                        <select class="form-select" id="customerId" th:field="*{customerId}" th:errorclass="is-invalid">
                            <option value="">Seleccionar cliente</option>
                            <option th:each="customer : ${customers}" th:value="${customer.id}" th:text="${customer.name}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{customerId}"></div>
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="projectId">Proyecto</label>
                        <select class="form-select" id="projectId" th:field="*{projectId}">
                            <option value="">Sin proyecto</option>
                            <option th:each="project : ${projects}" th:value="${project.id}" th:text="${project.name}"></option>
                        </select>
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="status">Estado</label>
                        <select class="form-select" id="status" th:field="*{status}">
                            <option th:each="status : ${statuses}" th:value="${status}" th:text="${status.label}"></option>
                        </select>
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="amount">Importe</label>
                        <input class="form-control" id="amount" type="number" step="0.01" min="0" th:field="*{amount}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{amount}"></div>
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="paidAmount">Cobrado</label>
                        <input class="form-control" id="paidAmount" type="number" step="0.01" min="0" th:field="*{paidAmount}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{paidAmount}"></div>
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="issueDate">Emision</label>
                        <input class="form-control" id="issueDate" type="date" th:field="*{issueDate}">
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="dueDate">Vencimiento</label>
                        <input class="form-control" id="dueDate" type="date" th:field="*{dueDate}">
                    </div>
                </div>
                <div class="mt-3 d-flex justify-content-end gap-2">
                    <a class="btn btn-outline-dark" th:href="@{/invoices/{id}(id=${invoice.id})}">Cancelar</a>
                    <button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> Guardar cambios</button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
