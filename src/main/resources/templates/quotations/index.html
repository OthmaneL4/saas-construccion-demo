<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head(${pageTitle})}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{layout/fragments :: sidebar}"></aside>
    <main class="app-main">
        <header th:replace="~{layout/fragments :: topbar}"></header>
        <section class="content">
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <form class="data-panel form-panel" th:action="@{/quotations}" th:object="${quotationForm}" method="post">
                <h2>Nuevo presupuesto</h2>
                <div class="row g-3">
                    <div class="col-lg-3">
                        <label class="form-label" for="quotationNumber">Numero</label>
                        <input class="form-control" id="quotationNumber" th:field="*{quotationNumber}" th:errorclass="is-invalid">
                        <div class="form-text">Propuesto automaticamente.</div>
                        <div class="invalid-feedback" th:errors="*{quotationNumber}"></div>
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="customerId">Cliente</label>
                        <select class="form-select" id="customerId" th:field="*{customerId}" th:errorclass="is-invalid">
                            <option value="">Seleccionar cliente</option>
                            <option th:each="customer : ${customers}" th:value="${customer.id}" th:text="${customer.name}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{customerId}"></div>
                    </div>
                    <div class="col-lg-4">
                        <label class="form-label" for="title">Titulo</label>
                        <input class="form-control" id="title" th:field="*{title}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{title}"></div>
                    </div>
                    <div class="col-lg-2">
                        <label class="form-label" for="amount">Importe</label>
                        <input class="form-control" id="amount" type="number" step="0.01" min="0" th:field="*{amount}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{amount}"></div>
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="issueDate">Emision</label>
                        <input class="form-control" id="issueDate" type="date" th:field="*{issueDate}">
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="expiryDate">Valido hasta</label>
                        <input class="form-control" id="expiryDate" type="date" th:field="*{expiryDate}">
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="status">Estado</label>
                        <select class="form-select" id="status" th:field="*{status}">
                            <option th:each="status : ${statuses}" th:value="${status}" th:text="${status.label}"></option>
                        </select>
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="description">Descripcion</label>
                        <input class="form-control" id="description" th:field="*{description}">
                    </div>
                </div>
                <div class="mt-3 text-end">
                    <button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> Guardar presupuesto</button>
                </div>
            </form>
            <div class="data-panel">
                <div class="panel-title"><h2>Presupuestos</h2></div>
                <div class="row g-3 mb-3">
                    <div class="col-md-3">
                        <div class="metric-card">
                            <span>Presupuestos filtrados</span>
                            <strong th:text="${quotationCount}">0</strong>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="metric-card">
                            <span>Total presupuestado</span>
                            <strong th:text="${'EUR ' + #numbers.formatDecimal(totalQuoted, 1, 'POINT', 2, 'COMMA')}">EUR 0</strong>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="metric-card">
                            <span>Aceptados</span>
                            <strong th:text="${acceptedCount}">0</strong>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="metric-card">
                            <span>Importe aceptado</span>
                            <strong th:text="${'EUR ' + #numbers.formatDecimal(acceptedQuoted, 1, 'POINT', 2, 'COMMA')}">EUR 0</strong>
                        </div>
                    </div>
                </div>
                <form class="row g-2 mb-3" th:action="@{/quotations}" method="get">
                    <div class="col-xl-3 col-lg-6">
                        <label class="form-label" for="quotationSearch">Buscar</label>
                        <input class="form-control" id="quotationSearch" name="q" th:value="${query}"
                               placeholder="Numero, titulo o cliente">
                    </div>
                    <div class="col-xl-3 col-lg-6">
                        <label class="form-label" for="quotationCustomerFilter">Cliente</label>
                        <select class="form-select" id="quotationCustomerFilter" name="customerId">
                            <option value="">Todos los clientes</option>
                            <option th:each="customer : ${customers}" th:value="${customer.id}"
                                    th:selected="${customer.id == selectedCustomerId}" th:text="${customer.name}">Cliente</option>
                        </select>
                    </div>
                    <div class="col-xl-2 col-lg-6">
                        <label class="form-label" for="quotationStatusFilter">Estado</label>
                        <select class="form-select" id="quotationStatusFilter" name="status">
                            <option value="">Todos</option>
                            <option th:each="status : ${statuses}"
                                    th:value="${status}"
                                    th:selected="${status == selectedStatus}"
                                    th:text="${status.label}">Estado</option>
                        </select>
                    </div>
                    <div class="col-xl-2 col-lg-6">
                        <label class="form-label" for="quotationValidFrom">Valido desde</label>
                        <input class="form-control" id="quotationValidFrom" type="date" name="validFrom" th:value="${validFrom}">
                    </div>
                    <div class="col-xl-2 col-lg-6">
                        <label class="form-label" for="quotationValidTo">Valido hasta</label>
                        <input class="form-control" id="quotationValidTo" type="date" name="validTo" th:value="${validTo}">
                    </div>
                    <div class="col-12 d-flex justify-content-end gap-2">
                        <button class="btn btn-outline-primary" type="submit">
                            <i class="fa-solid fa-filter"></i> Filtrar
                        </button>
                        <a class="btn btn-outline-dark" th:href="@{/quotations}"><i class="fa-solid fa-xmark"></i></a>
                    </div>
                </form>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>Numero</th>
                            <th>Cliente</th>
                            <th>Titulo</th>
                            <th>Estado</th>
                            <th>Importe</th>
                            <th>Valido hasta</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="quotation : ${quotations}">
                            <td><strong th:text="${quotation.quotationNumber}">Q-001</strong></td>
                            <td th:text="${quotation.customer.name}">Cliente</td>
                            <td th:text="${quotation.title}">Titulo</td>
                            <td><span class="badge-status" th:classappend="${'status-' + quotation.status}" th:text="${quotation.status.label}">Estado</span></td>
                            <td th:text="${'EUR ' + #numbers.formatDecimal(quotation.amount, 1, 'POINT', 2, 'COMMA')}">EUR 0</td>
                            <td th:text="${quotation.expiryDate ?: '-'}">Fecha</td>
                            <td>
                                <div class="row-actions">
                                    <a class="btn btn-sm btn-outline-primary" th:href="@{/quotations/{id}(id=${quotation.id})}">
                                        <i class="fa-solid fa-eye"></i>
                                    </a>
                                    <a class="btn btn-sm btn-outline-dark" th:href="@{/quotations/{id}/edit(id=${quotation.id})}">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>
                                    <form th:action="@{/quotations/{id}/archive(id=${quotation.id})}" method="post">
                                        <button class="btn btn-sm btn-outline-danger" type="submit">
                                            <i class="fa-solid fa-box-archive"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(quotations)}">
                            <td colspan="7" class="text-center text-secondary py-4">Todavia no hay presupuestos registrados.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
