<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head(${pageTitle})}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{layout/fragments :: sidebar}"></aside>
    <main class="app-main">
        <header th:replace="~{layout/fragments :: topbar}"></header>
        <section class="content">
            <form class="data-panel form-panel" th:action="@{/quotations/{id}/lines/{lineId}/edit(id=${quotation.id},lineId=${line.id})}" th:object="${quotationLineForm}" method="post">
                <h2>Editar linea de presupuesto</h2>
                <div class="row g-3">
                    <div class="col-lg-5">
                        <label class="form-label" for="description">Descripcion</label>
                        <input class="form-control" id="description" th:field="*{description}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{description}"></div>
                    </div>
                    <div class="col-lg-2">
                        <label class="form-label" for="quantity">Cantidad</label>
                        <input class="form-control" id="quantity" type="number" step="0.01" min="0.01" th:field="*{quantity}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{quantity}"></div>
                    </div>
                    <div class="col-lg-2">
                        <label class="form-label" for="unitPrice">Precio</label>
                        <input class="form-control" id="unitPrice" type="number" step="0.01" min="0" th:field="*{unitPrice}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{unitPrice}"></div>
                    </div>
                    <div class="col-lg-2">
                        <label class="form-label" for="vatRate">IVA %</label>
                        <input class="form-control" id="vatRate" type="number" step="0.01" min="0" th:field="*{vatRate}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{vatRate}"></div>
                    </div>
                </div>
                <div class="mt-3 d-flex justify-content-end gap-2">
                    <a class="btn btn-outline-dark" th:href="@{/quotations/{id}(id=${quotation.id})}">Cancelar</a>
                    <button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> Guardar cambios</button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
