<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head(${pageTitle})}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{layout/fragments :: sidebar}"></aside>
    <main class="app-main">
        <header th:replace="~{layout/fragments :: topbar}"></header>
        <section class="content">
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div class="row g-3 mb-4">
                <div class="col-md-6 col-xl-3">
                    <div class="stat-card accent-blue">
                        <div class="stat-icon icon-blue"><i class="fa-solid fa-calendar-check"></i></div>
                        <div>
                            <span>Eventos activos</span>
                            <strong th:text="${summary.totalEvents}">0</strong>
                            <small>Planificacion visible</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-xl-3">
                    <div class="stat-card accent-green">
                        <div class="stat-icon icon-green"><i class="fa-solid fa-calendar-day"></i></div>
                        <div>
                            <span>Hoy</span>
                            <strong th:text="${summary.todayEvents}">0</strong>
                            <small>Acciones del dia</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-xl-3">
                    <div class="stat-card accent-amber">
                        <div class="stat-icon icon-orange"><i class="fa-solid fa-arrow-up-right-dots"></i></div>
                        <div>
                            <span>Proximos</span>
                            <strong th:text="${summary.upcomingEvents}">0</strong>
                            <small>Hoy o futuro</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-xl-3">
                    <div class="stat-card accent-dark">
                        <div class="stat-icon"><i class="fa-solid fa-clock-rotate-left"></i></div>
                        <div>
                            <span>Pasados</span>
                            <strong th:text="${summary.overdueEvents}">0</strong>
                            <small>Revisar si procede</small>
                        </div>
                    </div>
                </div>
            </div>
            <form class="data-panel form-panel" th:action="@{/calendar}" th:object="${eventForm}" method="post">
                <h2>Nuevo evento</h2>
                <div class="row g-3">
                    <div class="col-lg-4">
                        <label class="form-label" for="title">Titulo</label>
                        <input class="form-control" id="title" th:field="*{title}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{title}"></div>
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="eventDate">Fecha</label>
                        <input class="form-control" id="eventDate" type="date" th:field="*{eventDate}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{eventDate}"></div>
                    </div>
                    <div class="col-lg-2">
                        <label class="form-label" for="type">Tipo</label>
                        <select class="form-select" id="type" th:field="*{type}" th:errorclass="is-invalid">
                            <option th:each="type : ${types}" th:value="${type}" th:text="${type.label}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{type}"></div>
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label" for="projectId">Proyecto</label>
                        <select class="form-select" id="projectId" th:field="*{projectId}">
                            <option value="">Sin proyecto</option>
                            <option th:each="project : ${projects}" th:value="${project.id}" th:text="${project.name}"></option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label" for="notes">Notas</label>
                        <input class="form-control" id="notes" th:field="*{notes}">
                    </div>
                </div>
                <div class="mt-3 text-end">
                    <button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> Guardar evento</button>
                </div>
            </form>
            <div class="data-panel">
                <div class="panel-title">
                    <h2>Calendario</h2>
                </div>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Evento</th>
                            <th>Tipo</th>
                            <th>Proyecto</th>
                            <th>Notas</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="event : ${events}">
                            <td th:text="${event.eventDate}">Fecha</td>
                            <td><strong th:text="${event.title}">Evento</strong></td>
                            <td><span class="badge-status status-PLANNED" th:text="${event.type.label}">Tipo</span></td>
                            <td th:text="${event.project != null ? event.project.name : '-'}">Proyecto</td>
                            <td th:text="${event.notes ?: '-'}">Notas</td>
                            <td>
                                <div class="row-actions">
                                    <a class="btn btn-sm btn-outline-primary" th:href="@{/calendar/{id}(id=${event.id})}">
                                        <i class="fa-solid fa-eye"></i> Ver
                                    </a>
                                    <a class="btn btn-sm btn-outline-dark" th:href="@{/calendar/{id}/edit(id=${event.id})}">
                                        <i class="fa-solid fa-pen"></i> Editar
                                    </a>
                                    <form th:action="@{/calendar/{id}/archive(id=${event.id})}" method="post">
                                        <button class="btn btn-sm btn-outline-danger" type="submit">
                                            <i class="fa-solid fa-box-archive"></i> Archivar
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(events)}">
                            <td colspan="6" class="text-center text-secondary py-4">Todavia no hay eventos en el calendario.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
