<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head(${pageTitle})}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{layout/fragments :: sidebar}"></aside>
    <main class="app-main">
        <header th:replace="~{layout/fragments :: topbar}"></header>
        <section class="content">
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div class="data-panel">
                <div class="panel-title">
                    <h2 th:text="${supplier.name}">Proveedor</h2>
                    <div class="row-actions">
                        <a class="btn btn-sm btn-outline-dark" th:href="@{/suppliers/{id}/edit(id=${supplier.id})}">
                            <i class="fa-solid fa-pen"></i> Editar
                        </a>
                        <form th:action="@{/suppliers/{id}/archive(id=${supplier.id})}" method="post">
                            <button class="btn btn-sm btn-outline-danger" type="submit">
                                <i class="fa-solid fa-box-archive"></i> Archivar
                            </button>
                        </form>
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/suppliers}">
                            <i class="fa-solid fa-arrow-left"></i> Volver
                        </a>
                    </div>
                </div>
                <div class="detail-grid">
                    <div class="detail-item"><span>Contacto</span><strong th:text="${supplier.contactName ?: '-'}">-</strong></div>
                    <div class="detail-item"><span>Email</span><strong th:text="${supplier.email ?: '-'}">-</strong></div>
                    <div class="detail-item"><span>Telefono</span><strong th:text="${supplier.phone ?: '-'}">-</strong></div>
                    <div class="detail-item"><span>Ciudad</span><strong th:text="${supplier.city ?: '-'}">-</strong></div>
                    <div class="detail-item"><span>Direccion</span><strong th:text="${supplier.address ?: '-'}">-</strong></div>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
