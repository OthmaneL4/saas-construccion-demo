spring.application.name=lsototalbouw

server.port=${PORT:8080}
spring.profiles.default=dev

spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.name=LSOTOTALBOUWSESSION
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.timeout=${SESSION_TIMEOUT:30m}

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

app.h2-console.enabled=false
app.demo-login.enabled=false
app.upload.documents-dir=${DOCUMENTS_DIR:uploads/documents}
app.upload.max-document-size-bytes=${DOCUMENTS_MAX_SIZE_BYTES:10485760}
app.security.login.max-failed-attempts=${LOGIN_MAX_FAILED_ATTEMPTS:5}
app.security.login.lock-minutes=${LOGIN_LOCK_MINUTES:15}

