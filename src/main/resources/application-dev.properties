spring.datasource.url=jdbc:h2:file:./data/lsototalbouw;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.thymeleaf.cache=false

app.h2-console.enabled=true
app.demo-login.enabled=true
app.demo-login.full-name=LSOTOTALBOUW Owner
app.demo-login.username=admin@lsototalbouw.nl
app.demo-login.password=Admin123!
app.demo-login.note=Entorno local de desarrollo con datos ficticios.
