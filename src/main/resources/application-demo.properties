spring.datasource.url=${DEMO_DB_URL:jdbc:h2:file:./data/lsototalbouw-demo;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.sql.init.mode=never

spring.h2.console.enabled=false
spring.thymeleaf.cache=true

server.forward-headers-strategy=framework
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=${SHUTDOWN_TIMEOUT:30s}
management.endpoint.health.probes.enabled=true

app.h2-console.enabled=false
app.public-demo.enabled=true
app.demo-login.enabled=true
app.demo-login.full-name=Portfolio Demo User
app.demo-login.username=demo@lsototalbouw.nl
app.demo-login.password=Demo2026!
app.demo-login.note=Public portfolio demo with fictional data. Do not enter real personal or business information.
app.upload.documents-dir=${DOCUMENTS_DIR:uploads/demo-documents}
